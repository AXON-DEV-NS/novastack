<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaStack | AXON_DEV</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="maintenance-overlay" class="modal-overlay" style="display:none; z-index: 9999;">
        <div class="modal-content glass-effect" style="border-color: #ff4b2b;">
            <h2 style="color: #ff4b2b;">⚠️ ضغط عمل مكثف</h2>
            <p>نعتذر منك، الموقع متوقف مؤقتاً لتسليم الطلبات الحالية. سنعود قريباً.</p>
        </div>
    </div>

    <div id="login-container" class="container glass-effect">
        <div class="brand-logo floating">NS</div>
        <h1 class="glow-text">NovaStack</h1>
        <button id="googleSignIn" class="order-btn glow-blue">Login with Google</button>
    </div>

    <div id="main-content" class="container glass-effect" style="display: none;">
        <header style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <div class="brand-logo" style="font-size:16px;">NovaStack</div>
            <select id="lang-select" class="glass-input" style="width: 100px; margin:0;">
                <option value="ar-eg">العربية 🇪🇬</option>
                <option value="en-us">English 🇺🇸</option>
                <option value="ar-sa">السعودية 🇸🇦</option>
            </select>
            <button id="logoutBtn" class="logout-btn">Logout</button>
        </header>

        <div id="order-stepper" class="stepper-wrapper" style="display:none;">
            <div class="step active" id="step-1">📝<br><small id="txt-step1">طلبك</small></div>
            <div class="step" id="step-2">💻<br><small id="txt-step2">التنفيذ</small></div>
            <div class="step" id="step-3">💰<br><small id="txt-step3">الدفع</small></div>
            <div class="step" id="step-4">✅<br><small id="txt-step4">التسليم</small></div>
        </div>

        <div id="user-interaction-zone" style="display:none; margin-bottom: 20px;">
            <div id="payment-ui" class="delivery-card" style="display:none; border: 1px solid #ff4b2b; border-radius:15px; padding:15px;">
                <h3 id="txt-pay-title" style="color: #ff4b2b;">💰 تأكيد الدفع</h3>
                <input type="file" id="pay-screenshot" class="glass-input" accept="image/*">
                <button id="client-confirm-pay" class="order-btn glow-green" style="width:100%;">تأكيد وإرسال 🚀</button>
            </div>
            <div id="wait-msg-ui" class="delivery-card" style="display:none; border: 1px solid gold; border-radius:15px; padding:15px;">
                <h3 id="txt-wait" style="color: gold;">🚀 جاري المراجعة...</h3>
                <div class="loading-bar"></div>
            </div>
            <div id="royal-link-box" class="royal-box" style="display:none;">
                <h3 style="color: var(--gold);">👑 استلم مشروعك</h3>
                <div class="royal-input-wrapper">
                    <input type="text" id="final-link-input" readonly>
                    <button id="copy-btn">📋</button>
                </div>
            </div>
        </div>

        <div class="calculator-card glass-effect">
            <h3 id="calc-h">🛠️ حاسبة المشاريع</h3>
            <select id="site-type" class="glass-input">
                <option value="50">Landing Page ($50)</option>
                <option value="150">Multi-page Site ($150)</option>
                <option value="400">E-commerce Store ($400)</option>
            </select>
            <div class="options-grid" style="text-align: right; margin: 10px 0;">
                <label><input type="checkbox" class="addon" id="opt-langs" value="20"> <span id="add-l">لغات متعددة</span></label><br>
                <label><input type="checkbox" class="addon" id="opt-admin" value="50"> <span id="add-a">لوحة مدير</span></label><br>
                <label><input type="checkbox" class="addon" id="opt-seo" value="30"> <span id="add-s">تحسين SEO</span></label><br>
                <label><input type="checkbox" class="addon" id="opt-speed" value="25"> <span id="add-p">سرعة فائقة</span></label>
            </div>
            <div class="price-tag">
                <h2 style="margin:5px 0;">$<span id="total-price">50</span></h2>
                <p style="font-size: 14px; color: gold;">≈ <span id="total-local">2500</span> <span id="currency-name">ج.م</span></p>
            </div>
            <button id="order-tg-btn" class="order-btn glow-blue" style="width:100%;">Order ✈️</button>
        </div>
    </div>

    <div id="admin-panel" class="container glass-effect admin-mode" style="display:none;">
        <h2 style="color:gold;">👑 AXON COMMAND</h2>
        <div class="admin-section">
            <h4>🚨 حالة الموقع</h4>
            <button id="toggle-site-btn" class="order-btn" style="width:100%;">Status</button>
        </div>
        <div class="admin-section">
            <h4>📦 تحديث العميل</h4>
            <input type="email" id="adm-email" placeholder="Email" class="glass-input">
            <input type="text" id="adm-link" placeholder="Link" class="glass-input">
            <select id="adm-status" class="glass-input">
                <option value="pending">💻 Pending</option>
                <option value="paid">💰 Payment</option>
                <option value="confirmed">✅ Delivered</option>
            </select>
            <button id="adm-send-btn" class="order-btn glow-blue" style="width:100%;">Update</button>
        </div>
        <div class="admin-section">
            <div style="display:flex; justify-content:space-between;">
                <h4>🖼️ الأرشيف</h4>
                <button id="clear-all-images" style="background:red; color:white; border:none; padding:5px; border-radius:5px; cursor:pointer;">Clear 🧹</button>
            </div>
            <div id="received-images-list" class="image-feed"></div>
        </div>
        <button id="admin-logout" class="logout-btn" style="width:100%; margin-top:10px;">Logout</button>
    </div>
    <script type="module" src="script.js"></script>
</body>
</html>
