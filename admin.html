<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>لوحة تحكم المدير | يوسف</title>
</head>
<body>
    <header>
        <div class="logo glitch">ADMIN PANEL</div>
        <p>مرحباً يوسف (AXON_DEV)</p>
    </header>

    <main style="padding: 30px;">
        <h2 style="color: #00d4ff;">الطلبات الجديدة الواردة:</h2>
        <hr style="border: 0.5px solid #333; margin: 20px 0;">
        
        <div id="adminOrdersDisplay">
            <p style="color: #666;">في انتظار وصول طلبات دفع جديدة...</p>
        </div>
    </main>

    <script src="script.js"></script>
    <script>
        // كود بسيط لعرض الطلبات المخزنة في لوحة المدير
        window.onload = function() {
            const display = document.getElementById('adminOrdersDisplay');
            const orders = JSON.parse(localStorage.getItem('axon_orders')) || [];
            
            if(orders.length > 0) {
                display.innerHTML = orders.map((o, i) => `
                    <div style="background:#1a1a1a; padding:20px; border-radius:10px; margin-bottom:15px; border-right: 5px solid #00d4ff; text-align:right;">
                        <p><strong>الجيميل:</strong> ${o.email}</p>
                        <p><strong>الإضافات:</strong> ${o.extras || 'لا يوجد'}</p>
                        <p><strong>الملحوظة:</strong> ${o.note || 'لا توجد'}</p>
                        <div style="margin-top:10px;">
                            <button onclick="alert('تم التأكيد')" style="background:green; color:white; padding:5px 15px; border:none; border-radius:3px; cursor:pointer;">تأكيد الدفع</button>
                            <button onclick="alert('تم الرفض')" style="background:red; color:white; padding:5px 15px; border:none; border-radius:3px; cursor:pointer; margin-right:10px;">لم يصل شيء</button>
                        </div>
                    </div>
                `).join('');
            }
        };
    </script>
</body>
</html>
